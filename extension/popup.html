<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OneLog Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; width: 320px; color: #333; }
        .container { background: white; padding: 25px 20px; text-align: center; }
        h2 { color: #003366; font-size: 18px; margin: 0 0 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        /* Telas */
        #view-login, #view-logged, #view-working { display: none; }
        
        /* Formulário */
        .login-box { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; }
        input:focus { border-color: #003366; outline: none; }
        
        /* Status */
        .user-badge { background: #e3f2fd; color: #003366; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 13px;}
        .status-text { font-size: 13px; font-weight: bold; color: #003366; margin: 15px 0; min-height: 20px;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #003366; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Botões */
        button { border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; font-size: 13px;}
        .btn-primary { background-color: #003366; color: white; margin-bottom: 8px;}
        .btn-primary:hover { background-color: #002244; }
        .btn-secondary { background-color: #f0f2f5; color: #d32f2f; }
        .btn-secondary:hover { background-color: #ffebee; }
        
        .error { color: #d32f2f; font-size: 12px; font-weight: bold; margin-top: 10px; display: none;}
        .footer { font-size: 10px; color: #888; margin-top: 15px; border-top: 1px solid #eee; padding-top: 8px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ OneLog Enterprise</h2>
        
        <!-- Tela 1: Usuário não logado -->
        <div id="view-login">
            <div class="login-box">
                <label>USUÁRIO DA REDE (AD)</label>
                <input type="text" id="username" placeholder="ex: rildon.silva" spellcheck="false">
                <label>SENHA DO WINDOWS</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button id="btn-login" class="btn-primary">Entrar e Salvar Conta</button>
        </div>

        <!-- Tela 2: Usuário já logado e salvo no disco -->
        <div id="view-logged">
            <div class="user-badge" id="logged-user-name">👤 Usuário</div>
            <button id="btn-access" class="btn-primary">Acessar Portal BB</button>
            <button id="btn-logout" class="btn-secondary">Sair da Conta</button>
        </div>

        <!-- Tela 3: Robô trabalhando -->
        <div id="view-working">
            <div class="loader"></div>
            <div class="status-text" id="status-text">Conectando...</div>
            <p style="font-size:10px; color:#666; margin-top: 10px; background: #fff8e1; padding: 8px; border-radius: 4px;">Você pode clicar fora desta janela e continuar trabalhando. A aba abrirá sozinha quando terminar.</p>
        </div>

        <div id="error-msg" class="error"></div>
        <div class="footer">Autenticação via MDR.LOCAL</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
