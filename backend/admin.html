<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneLog - Painel de Controle</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compila o JSX no navegador) -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // ============================================================================
        // MÓDULO 1: COMPONENTES UI COMPARTILHADOS
        // ============================================================================
        
        const KpiCard = ({ title, value, subtitle, icon, colorClass }) => (
            <div className={`bg-white p-6 rounded-xl shadow-sm border-l-4 ${colorClass}`}>
                <h3 className="text-gray-500 text-xs font-bold uppercase">{title}</h3>
                <p className={`text-3xl font-black mt-2 text-gray-800 flex items-center gap-3`}>
                    {value}
                    {subtitle && <span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">{subtitle}</span>}
                </p>
            </div>
        );

        const StatusBadge = ({ status }) => {
            const s = (status || 'ativo').toLowerCase();
            const colors = {
                'ativo': 'bg-green-700 text-white border-green-800',
                'bloqueada': 'bg-red-700 text-white border-red-800',
                'cadastro_inicial': 'bg-teal-100 text-teal-800 border-teal-200',
                'provisoria_recebida': 'bg-gray-200 text-gray-800 border-gray-300',
                'termo_assinado': 'bg-green-300 text-green-900 border-green-400'
            };
            const color = colors[s] || 'bg-blue-50 text-blue-800 border-blue-200';
            const label = s.replace(/_/g, ' ').toUpperCase();
            
            return <div className={`${color} border px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider inline-block shadow-sm`}>{label}</div>;
        };

        // ============================================================================
        // MÓDULO 2: TELA DE LOGIN (AUTH)
        // ============================================================================
        const AuthScreen = ({ onLogin }) => {
            const [inputToken, setInputToken] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                onLogin(inputToken);
            };

            return (
                <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto mt-20 text-center">
                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i className="fas fa-lock"></i>
                    </div>
                    <h2 className="font-bold text-xl mb-6">Acesso Administrativo</h2>
                    <form onSubmit={handleSubmit}>
                        <input 
                            type="password" 
                            value={inputToken}
                            onChange={(e) => setInputToken(e.target.value)}
                            placeholder="Insira a Chave de Segurança" 
                            className="w-full p-3 border rounded mb-4 focus:outline-none focus:border-blue-500 text-center tracking-widest"
                        />
                        <button type="submit" className="bg-blue-600 text-white px-4 py-3 rounded w-full font-bold hover:bg-blue-700 transition">
                            Desbloquear Painel
                        </button>
                    </form>
                </div>
            );
        };

        // ============================================================================
        // MÓDULO 3: MODAL DE CONTA (CRIAR/EDITAR)
        // ============================================================================
        const AccountModal = ({ isOpen, onClose, onSave, accountData, adSectors }) => {
            if (!isOpen) return null;

            const [formData, setFormData] = useState({
                id: '', login: '', titular: '', senha: '', 
                status: 'cadastro_inicial', status_custom: '', 
                data_validade: '', status_updated_at: '', setores: []
            });
            const [showPassword, setShowPassword] = useState(false);

            useEffect(() => {
                if (accountData) {
                    setFormData({
                        id: accountData.id,
                        login: accountData.login,
                        titular: accountData.titular === "Não informado" ? "" : accountData.titular,
                        senha: accountData.senha || "",
                        status: accountData.status || 'ativo',
                        status_custom: '',
                        data_validade: accountData.data_validade || '',
                        status_updated_at: accountData.status_updated_at ? accountData.status_updated_at.split('T')[0] : '',
                        setores: accountData.setores || []
                    });
                } else {
                    setFormData({ id: '', login: '', titular: '', senha: '', status: 'cadastro_inicial', status_custom: '', data_validade: '', status_updated_at: '', setores: [] });
                }
                setShowPassword(false);
            }, [accountData]);

            const handleSectorToggle = (sector) => {
                setFormData(prev => ({
                    ...prev,
                    setores: prev.setores.includes(sector) 
                        ? prev.setores.filter(s => s !== sector)
                        : [...prev.setores, sector]
                }));
            };

            const handleSubmit = () => {
                let finalStatus = formData.status;
                if (finalStatus === "_custom_") {
                    finalStatus = formData.status_custom.trim().toLowerCase().replace(/ /g, '_');
                    if (!finalStatus) return alert("Digite o status personalizado.");
                }
                if (!formData.login) return alert("O Login é obrigatório.");
                if (!formData.id && !formData.senha) return alert("A senha é obrigatória para contas novas.");

                onSave({ ...formData, status: finalStatus });
            };

            const isCustomStatus = !['ativo', 'bloqueada', 'cadastro_inicial'].includes(formData.status) && formData.status !== '_custom_';

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
                    <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="bg-blue-50 border-b border-blue-100 p-5 flex justify-between items-center">
                            <h3 className="font-bold text-xl text-blue-900">{formData.id ? "Configurar Conta BB" : "Nova Conta BB"}</h3>
                            <button onClick={onClose} className="text-blue-400 hover:text-blue-700 text-xl">&times;</button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto custom-scroll">
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Login (Matrícula)</label>
                                    <input type="text" value={formData.login} onChange={e => setFormData({...formData, login: e.target.value.toUpperCase()})} disabled={!!formData.id} className={`w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500 font-mono uppercase ${formData.id ? 'bg-gray-100' : ''}`} placeholder="Ex: F1234567" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Titular da Conta</label>
                                    <input type="text" value={formData.titular} onChange={e => setFormData({...formData, titular: e.target.value})} className="w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500" placeholder="Nome Completo" />
                                </div>
                            </div>

                            <div className="mb-4 relative">
                                <label className="text-xs font-bold text-gray-500 uppercase">Senha Banco do Brasil</label>
                                <input type={showPassword ? "text" : "password"} value={formData.senha} onChange={e => setFormData({...formData, senha: e.target.value})} className="w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500 font-mono pr-10" placeholder="Digite a senha (ou deixe em branco)" />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-[34px] text-gray-500 hover:text-blue-600 focus:outline-none">
                                    <i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Status</label>
                                    <select value={isCustomStatus ? "_custom_" : formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500 text-sm font-bold tracking-wide">
                                        <option value="ativo">ATIVO</option>
                                        <option value="bloqueada">BLOQUEADA</option>
                                        <option value="cadastro_inicial">CADASTRO INICIAL</option>
                                        {isCustomStatus && <option value="_custom_">{formData.status.replace(/_/g, ' ').toUpperCase()}</option>}
                                        {!isCustomStatus && <option value="_custom_">+ Outro...</option>}
                                    </select>
                                    {(formData.status === "_custom_" || isCustomStatus) && (
                                        <input type="text" value={isCustomStatus ? formData.status : formData.status_custom} onChange={e => setFormData({...formData, status_custom: e.target.value})} className="w-full p-2 border rounded mt-2 text-sm outline-none focus:border-blue-500" placeholder="Novo status..." />
                                    )}
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Vencimento (Opcional)</label>
                                    <input type="date" value={formData.data_validade} onChange={e => setFormData({...formData, data_validade: e.target.value})} className="w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500 text-sm" />
                                </div>
                            </div>

                            <div className="mb-4">
                                <label className="text-xs font-bold text-gray-500 uppercase">Modificado em (Retroativo)</label>
                                <input type="date" value={formData.status_updated_at} onChange={e => setFormData({...formData, status_updated_at: e.target.value})} className="w-full p-2.5 border rounded mt-1 outline-none focus:border-blue-500 text-sm" />
                            </div>

                            <div className="mb-2">
                                <label className="text-xs font-bold text-gray-500 uppercase">Setores do AD Autorizados</label>
                                <div className="border rounded-lg p-3 bg-gray-50 max-h-40 overflow-y-auto custom-scroll grid grid-cols-2 gap-2">
                                    {adSectors.map(sector => (
                                        <label key={sector} className="flex items-center space-x-2 text-sm text-gray-700 cursor-pointer hover:bg-gray-200 p-1.5 rounded transition">
                                            <input type="checkbox" checked={formData.setores.includes(sector)} onChange={() => handleSectorToggle(sector)} className="form-checkbox h-4 w-4 text-blue-600 border-gray-300 rounded" />
                                            <span className="truncate">{sector}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        <div className="p-5 border-t bg-gray-50 flex justify-end gap-3">
                            <button onClick={onClose} className="px-5 py-2 text-gray-600 font-bold hover:bg-gray-200 rounded transition">Cancelar</button>
                            <button onClick={handleSubmit} className="px-6 py-2 bg-blue-600 text-white font-bold rounded shadow hover:bg-blue-700 transition flex items-center">
                                <i className="fas fa-save mr-2"></i> Salvar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MÓDULO 4: TAB VIEW - DASHBOARD (TEMPO REAL)
        // ============================================================================
        const DashboardView = ({ token, adSectors }) => {
            const [stats, setStats] = useState({ logins_solicitados: 0, cookies_injetados: 0, robos_executados: 0, queue_size: 0, economia_pct: 0 });
            const [accounts, setAccounts] = useState([]);
            
            // Filtros e Ordenação
            const [search, setSearch] = useState("");
            const [statusFilter, setStatusFilter] = useState("");
            const [sectorFilter, setSectorFilter] = useState("");
            const [sortCol, setSortCol] = useState('default');
            const [sortAsc, setSortAsc] = useState(true);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingAccount, setEditingAccount] = useState(null);

            const fetchData = useCallback(async () => {
                try {
                    const [resStats, resAcc] = await Promise.all([
                        fetch('/api/admin/dashboard_stats', { headers: { 'X-Admin-Token': token } }),
                        fetch('/api/admin/accounts', { headers: { 'X-Admin-Token': token } })
                    ]);
                    if (resStats.ok) setStats(await resStats.json());
                    if (resAcc.ok) setAccounts(await resAcc.json());
                } catch (e) { console.error("Erro ao buscar dados do dashboard:", e); }
            }, [token]);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 5000);
                return () => clearInterval(interval);
            }, [fetchData]);

            const handleSaveAccount = async (payload) => {
                const url = payload.id ? `/api/admin/accounts/${payload.id}` : `/api/admin/accounts`;
                const method = payload.id ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, { method, headers: { 'X-Admin-Token': token, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (res.ok) { setIsModalOpen(false); fetchData(); }
                    else { const err = await res.json(); alert(err.erro); }
                } catch (e) { alert("Erro de conexão."); }
            };

            const handleAction = async (action, id) => {
                if (action === 'delete' && !confirm("Remover esta conta permanentemente?")) return;
                if (action === 'clear' && !confirm("Expurgar a sessão (cookies) desta conta? O robô fará login do zero.")) return;
                
                const url = action === 'delete' ? `/api/admin/accounts/${id}` : `/api/admin/accounts/${id}/clear`;
                const method = action === 'delete' ? 'DELETE' : 'POST';
                
                try {
                    const res = await fetch(url, { method, headers: { 'X-Admin-Token': token }});
                    if (res.ok) fetchData();
                } catch (e) { console.error(e); }
            };

            const handleSort = (col) => {
                if (sortCol === col) setSortAsc(!sortAsc);
                else { setSortCol(col); setSortAsc(true); }
            };

            const getStatusWeight = (status) => {
                const s = (status || '').toLowerCase();
                if (['ativo', 'provisoria_recebida', 'termo_assinado'].includes(s)) return 1;
                if (s === 'cadastro_inicial') return 2;
                if (s === 'bloqueada') return 3;
                return 4; // Outros/Desconhecido
            };

            const sortedAndFilteredAccounts = useMemo(() => {
                let filtered = accounts.filter(acc => {
                    const safeStatus = (acc.status || 'desconhecido').toLowerCase();
                    if (statusFilter && safeStatus !== statusFilter) return false;
                    if (sectorFilter && (!acc.setores || !acc.setores.includes(sectorFilter))) return false;
                    if (search) {
                        const q = search.toLowerCase();
                        return acc.login.toLowerCase().includes(q) || (acc.titular && acc.titular.toLowerCase().includes(q));
                    }
                    return true;
                });

                return filtered.sort((a, b) => {
                    // Ordenação Padrão: Ativos no topo, depois ordenado por Login
                    if (sortCol === 'default') {
                        const wA = getStatusWeight(a.status);
                        const wB = getStatusWeight(b.status);
                        if (wA !== wB) return wA - wB;
                        return a.login.localeCompare(b.login);
                    }
                    
                    // Ordenação Personalizada pelo usuário (Cliques na Tabela)
                    let valA = a[sortCol] || '';
                    let valB = b[sortCol] || '';
                    
                    if (sortCol === 'status') {
                        const wA = getStatusWeight(a.status);
                        const wB = getStatusWeight(b.status);
                        if (wA !== wB) return sortAsc ? wA - wB : wB - wA;
                    }
                    
                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();
                    
                    if (valA < valB) return sortAsc ? -1 : 1;
                    if (valA > valB) return sortAsc ? 1 : -1;
                    return 0;
                });
            }, [accounts, search, statusFilter, sectorFilter, sortCol, sortAsc]);

            const uniqueStatuses = useMemo(() => [...new Set(accounts.map(a => (a.status || '').toLowerCase()))].filter(Boolean).sort(), [accounts]);

            const renderSortIcon = (col) => {
                if (sortCol !== col && sortCol !== 'default') return <i className="fas fa-sort ml-1 opacity-30"></i>;
                if (sortCol === 'default') return <i className="fas fa-sort ml-1 opacity-30"></i>;
                return <i className={`fas fa-sort-${sortAsc ? 'up' : 'down'} ml-1 text-blue-500`}></i>;
            };

            return (
                <div>
                    <h2 className="text-xl font-bold text-gray-800 mb-4">Métricas de Hoje</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <KpiCard title="Acessos Solicitados" value={stats.logins_solicitados || 0} colorClass="border-l-blue-500" />
                        <KpiCard title="Cookies Injetados" value={stats.cookies_injetados || 0} colorClass="border-l-green-500" />
                        <KpiCard title="Execuções do Robô" value={stats.robos_executados || 0} subtitle={`${stats.queue_size || 0} na fila`} colorClass="border-l-yellow-500" />
                        <KpiCard title="Eficiência do Pool" value={`${stats.economia_pct || 0}%`} colorClass="border-l-purple-500" />
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <h2 className="text-2xl font-bold text-gray-800"><i className="fas fa-users-cog mr-2 text-gray-400"></i>Pool de Contas BB</h2>
                        <button onClick={() => { setEditingAccount(null); setIsModalOpen(true); }} className="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-blue-700 shadow transition flex items-center">
                            <i className="fas fa-user-plus mr-2"></i> Nova Conta BB
                        </button>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 flex flex-col md:flex-row gap-4">
                        <div className="flex-1 relative">
                            <i className="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Pesquisar matrícula, nome..." className="w-full pl-10 p-2 border rounded outline-none focus:border-blue-500" />
                        </div>
                        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="w-full md:w-56 p-2 border rounded outline-none focus:border-blue-500">
                            <option value="">Todos os Status</option>
                            {uniqueStatuses.map(s => <option key={s} value={s}>{s.replace(/_/g, ' ').toUpperCase()}</option>)}
                        </select>
                        <select value={sectorFilter} onChange={e => setSectorFilter(e.target.value)} className="w-full md:w-56 p-2 border rounded outline-none focus:border-blue-500">
                            <option value="">Todos os Setores</option>
                            {adSectors.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse min-w-[900px]">
                                <thead className="bg-gray-100 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
                                    <tr>
                                        <th className="p-4 font-semibold cursor-pointer hover:bg-gray-200 transition" onClick={() => handleSort('login')}>
                                            Conta (Login) {renderSortIcon('login')}
                                        </th>
                                        <th className="p-4 font-semibold cursor-pointer hover:bg-gray-200 transition" onClick={() => handleSort('titular')}>
                                            Titular {renderSortIcon('titular')}
                                        </th>
                                        <th className="p-4 font-semibold">Setores Vinculados</th>
                                        <th className="p-4 font-semibold text-center cursor-pointer hover:bg-gray-200 transition" onClick={() => handleSort('status')}>
                                            Status / Validade {renderSortIcon('status')}
                                        </th>
                                        <th className="p-4 font-semibold text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="text-sm divide-y divide-gray-100">
                                    {sortedAndFilteredAccounts.map(acc => (
                                        <tr key={acc.id} className="hover:bg-gray-50 transition border-b border-gray-100">
                                            <td className="p-4 font-mono font-bold text-gray-800"><i className="fas fa-fingerprint text-gray-400 mr-2"></i>{acc.login}</td>
                                            <td className="p-4 font-semibold text-gray-700">{acc.titular || '-'}</td>
                                            <td className="p-4 flex flex-wrap gap-1 max-w-[250px]">
                                                {acc.setores && acc.setores.length > 0 
                                                    ? acc.setores.map(s => <span key={s} className="bg-blue-100 text-blue-800 text-[10px] px-2 py-0.5 rounded border border-blue-200">{s}</span>)
                                                    : <span className="text-gray-400 text-xs italic">Nenhum setor</span>}
                                            </td>
                                            <td className="p-4 text-center">
                                                <StatusBadge status={acc.status} />
                                                <div className="mt-1.5 text-[10px] text-gray-400 font-bold">{acc.data_validade ? `Validade: ${acc.data_validade}` : 'Sem vencimento'}</div>
                                            </td>
                                            <td className="p-4 text-center whitespace-nowrap">
                                                <button onClick={() => handleAction('clear', acc.id)} className="text-orange-500 hover:text-orange-700 bg-orange-50 p-2 rounded transition mr-1" title="Limpar Cookies"><i className="fas fa-eraser"></i></button>
                                                <button onClick={() => { setEditingAccount(acc); setIsModalOpen(true); }} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded transition mr-1" title="Editar"><i className="fas fa-cog"></i></button>
                                                <button onClick={() => handleAction('delete', acc.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded transition" title="Excluir"><i className="fas fa-trash-alt"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {sortedAndFilteredAccounts.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-gray-500">Nenhum resultado encontrado.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <AccountModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSaveAccount} accountData={editingAccount} adSectors={adSectors} />
                </div>
            );
        };

        // ============================================================================
        // MÓDULO 5: TAB VIEW - ANALYTICS (PROTEGIDO CONTRA VERSÕES DE API)
        // ============================================================================
        const AnalyticsView = ({ token }) => {
            const [dates, setDates] = useState({
                start: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                end: new Date().toISOString().split('T')[0]
            });
            const [data, setData] = useState(null);
            const [errorImages, setErrorImages] = useState([]);

            const fetchAnalytics = async () => {
                try {
                    const res = await fetch(`/api/admin/analytics?start=${dates.start}&end=${dates.end}`, { headers: { 'X-Admin-Token': token } });
                    if (res.ok) setData(await res.json());
                } catch (e) { alert("Erro ao buscar histórico."); }
            };

            const fetchErrorImages = async () => {
                try {
                    const res = await fetch('/api/admin/error_images', { headers: { 'X-Admin-Token': token } });
                    if (res.ok) setErrorImages(await res.json());
                } catch (e) { console.error("Erro ao buscar galeria", e); }
            };

            useEffect(() => { 
                fetchAnalytics(); 
                fetchErrorImages();
            }, []);

            if (!data) return <div className="text-center p-10"><i className="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>;

            // --- PROTEÇÃO ANTI-CRASH (Suporta tanto a API antiga quanto a Nova) ---
            const totalLogins = data.efficiency ? data.efficiency.total_logins_requested : (data.total_logins || 0);
            const totalCookies = data.efficiency ? data.efficiency.total_cookies_injected : (data.total_cookies || 0);
            const economiaPct = data.efficiency ? data.efficiency.economia_pct : (data.economia_pct || 0);
            const robotsPerformance = data.robots_performance || [];
            const errorDiagnostics = data.error_diagnostics || [];
            const sectorsData = data.sectors || [];
            const accountsData = data.accounts || [];

            return (
                <div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-col md:flex-row items-end md:items-center gap-4">
                        <div>
                            <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Data Início</label>
                            <input type="date" value={dates.start} onChange={e => setDates({...dates, start: e.target.value})} className="p-2 border rounded outline-none focus:border-blue-500 text-sm" />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Data Fim</label>
                            <input type="date" value={dates.end} onChange={e => setDates({...dates, end: e.target.value})} className="p-2 border rounded outline-none focus:border-blue-500 text-sm" />
                        </div>
                        <button onClick={fetchAnalytics} className="bg-blue-800 text-white px-6 py-2 rounded font-bold hover:bg-blue-700 transition h-[38px] flex items-center">
                            <i className="fas fa-search mr-2"></i> Filtrar Histórico
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div className="bg-gradient-to-br from-blue-500 to-blue-700 p-6 rounded-xl shadow-sm text-white">
                            <h3 className="text-blue-100 text-xs font-bold uppercase">Total de Acessos no Período</h3>
                            <p className="text-4xl font-black mt-2">{totalLogins}</p>
                        </div>
                        <div className="bg-gradient-to-br from-green-500 to-green-700 p-6 rounded-xl shadow-sm text-white">
                            <h3 className="text-green-100 text-xs font-bold uppercase">Cookies Fornecidos</h3>
                            <p className="text-4xl font-black mt-2">{totalCookies}</p>
                        </div>
                        <div className="bg-gradient-to-br from-purple-500 to-purple-700 p-6 rounded-xl shadow-sm text-white">
                            <h3 className="text-purple-100 text-xs font-bold uppercase">Economia no Período</h3>
                            <p className="text-4xl font-black mt-2">{economiaPct}%</p>
                        </div>
                    </div>

                    {/* PAINÉIS DE TELEMETRIA DOS ROBÔS */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-gray-50 border-b border-gray-200 p-4"><h3 className="font-bold text-gray-700"><i className="fas fa-robot mr-2 text-indigo-500"></i>Saúde da Frota (Robôs)</h3></div>
                            <ul className="divide-y divide-gray-100 max-h-[300px] overflow-y-auto custom-scroll">
                                {robotsPerformance.length === 0 && <li className="p-8 text-center text-gray-400">Sem dados operacionais. (Atualize a API)</li>}
                                {robotsPerformance.map(r => (
                                    <li key={r.name} className="p-4 flex items-center justify-between hover:bg-gray-50">
                                        <span className="font-bold text-gray-700">{r.name}</span>
                                        <div className="text-sm flex gap-4">
                                            <span className="text-green-600 font-bold"><i className="fas fa-check-circle mr-1"></i>{r.success}</span>
                                            <span className="text-red-500 font-bold"><i className="fas fa-times-circle mr-1"></i>{r.error}</span>
                                        </div>
                                        <span className="font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{r.success_rate}% Taxa</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-gray-50 border-b border-gray-200 p-4"><h3 className="font-bold text-gray-700"><i className="fas fa-bug mr-2 text-red-500"></i>Diagnóstico de Falhas</h3></div>
                            <ul className="divide-y divide-gray-100 max-h-[300px] overflow-y-auto custom-scroll">
                                {errorDiagnostics.length === 0 && <li className="p-8 text-center text-gray-400">Nenhum erro registrado ou API desatualizada.</li>}
                                {errorDiagnostics.map(e => (
                                    <li key={e.reason} className="p-4 flex items-center justify-between hover:bg-gray-50">
                                        <span className="text-sm font-medium text-gray-600 w-3/4 truncate pr-4" title={e.reason}>{e.reason}</span>
                                        <span className="font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">{e.count} ocorrências</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    {/* GALERIA DE PRINTS DOS ERROS */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                        <div className="bg-gray-50 border-b border-gray-200 p-4 flex justify-between items-center">
                            <h3 className="font-bold text-gray-700"><i className="fas fa-camera mr-2 text-red-500"></i>Galeria de Erros Recentes (Debug)</h3>
                            <button onClick={fetchErrorImages} className="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded transition"><i className="fas fa-sync-alt"></i> Atualizar</button>
                        </div>
                        <div className="p-6">
                            {errorImages.length === 0 ? (
                                <p className="text-gray-400 text-center py-4">Nenhuma imagem de erro encontrada ou aguardando atualização da API.</p>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                    {errorImages.map(img => (
                                        <a key={img.name} href={img.url} target="_blank" rel="noreferrer" className="block border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition group relative">
                                            <img src={img.url} alt={img.name} className="w-full h-24 object-cover border-b" />
                                            <div className="p-2 bg-gray-800 w-full text-center">
                                                <p className="text-[10px] text-white truncate font-bold" title={img.name}>{img.name.split('_T')[0]}</p>
                                                <p className="text-[9px] text-gray-300 mt-1"><i className="fas fa-clock mr-1"></i>{img.date_str}</p>
                                            </div>
                                            <div className="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition flex items-center justify-center">
                                                <i className="fas fa-search-plus text-white opacity-0 group-hover:opacity-100 text-2xl transition"></i>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* RANKING ORIGINAL DE SETORES E CONTAS */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-gray-50 border-b border-gray-200 p-4"><h3 className="font-bold text-gray-700"><i className="fas fa-chart-bar mr-2 text-blue-500"></i>Ranking de Uso por Setor</h3></div>
                            <ul className="divide-y divide-gray-100 max-h-[400px] overflow-y-auto custom-scroll">
                                {sectorsData.length === 0 && <li className="p-8 text-center text-gray-400">Sem dados.</li>}
                                {sectorsData.map(s => {
                                    let maxVal = totalLogins > 0 ? totalLogins : 1;
                                    let w = Math.min((s.count / maxVal) * 100, 100);
                                    return (
                                        <li key={s.name} className="p-4 hover:bg-gray-50 flex items-center justify-between">
                                            <span className="font-bold text-gray-700 w-1/3 truncate">{s.name}</span>
                                            <div className="flex-1 mx-4 bg-gray-200 rounded-full h-2.5"><div className="bg-blue-500 h-2.5 rounded-full" style={{width: `${w}%`}}></div></div>
                                            <span className="text-sm font-bold text-blue-600 w-24 text-right">{s.count} acessos</span>
                                        </li>
                                    );
                                })}
                            </ul>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-gray-50 border-b border-gray-200 p-4"><h3 className="font-bold text-gray-700"><i className="fas fa-id-card mr-2 text-green-500"></i>Ranking de Acessos por Conta</h3></div>
                            <ul className="divide-y divide-gray-100 max-h-[400px] overflow-y-auto custom-scroll">
                                {accountsData.length === 0 && <li className="p-8 text-center text-gray-400">Sem dados.</li>}
                                {accountsData.map(a => {
                                    let maxVal = totalLogins > 0 ? totalLogins : 1;
                                    let w = Math.min((a.count / maxVal) * 100, 100);
                                    return (
                                        <li key={a.name} className="p-4 hover:bg-gray-50 flex items-center justify-between">
                                            <span className="font-mono font-bold text-gray-600 w-1/4 truncate">{a.name}</span>
                                            <div className="flex-1 mx-4 bg-gray-200 rounded-full h-2.5"><div className="bg-green-500 h-2.5 rounded-full" style={{width: `${w}%`}}></div></div>
                                            <span className="text-sm font-bold text-green-600 w-24 text-right">{a.count} acessos</span>
                                        </li>
                                    );
                                })}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MÓDULO PRINCIPAL: APP CONTAINER
        // ============================================================================
        const App = () => {
            const [token, setToken] = useState("");
            const [activeTab, setActiveTab] = useState("dashboard");
            const [adSectors, setAdSectors] = useState([]);

            const handleLogin = async (inputToken) => {
                try {
                    const res = await fetch('/api/admin/ad_sectors', { headers: { 'X-Admin-Token': inputToken } });
                    if (res.ok) {
                        setAdSectors(await res.json());
                        setToken(inputToken);
                    } else { alert("Acesso Negado. Chave incorreta."); }
                } catch (e) { alert("Erro ao conectar com o servidor."); }
            };

            const handleLogout = () => { setToken(""); };

            if (!token) return <AuthScreen onLogin={handleLogin} />;

            return (
                <div>
                    <nav className="bg-blue-900 text-white p-4 shadow-md">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center">
                                <i className="fas fa-robot text-blue-300 mr-3 text-2xl"></i> OneLog Enterprise
                            </h1>
                            <button onClick={handleLogout} className="text-sm bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded font-bold transition">Sair do Painel</button>
                        </div>
                    </nav>

                    <main className="container mx-auto p-6 mt-4">
                        <div className="mb-6 border-b border-gray-200">
                            <nav className="-mb-px flex space-x-8">
                                <button onClick={() => setActiveTab('dashboard')} className={`whitespace-nowrap py-4 px-1 border-b-2 font-bold text-sm flex items-center gap-2 ${activeTab === 'dashboard' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>
                                    <i className="fas fa-satellite-dish"></i> Pool em Tempo Real
                                </button>
                                <button onClick={() => setActiveTab('analytics')} className={`whitespace-nowrap py-4 px-1 border-b-2 font-bold text-sm flex items-center gap-2 ${activeTab === 'analytics' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>
                                    <i className="fas fa-chart-pie"></i> Histórico & Analytics
                                </button>
                            </nav>
                        </div>

                        {activeTab === 'dashboard' && <DashboardView token={token} adSectors={adSectors} />}
                        {activeTab === 'analytics' && <AnalyticsView token={token} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
