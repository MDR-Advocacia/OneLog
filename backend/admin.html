                                        <div className="mt-3 grid grid-cols-2 gap-2 text-xs text-slate-500">
                                            <div>Endpoint: <strong>{entry.endpoint || '-'}</strong></div>
                                            <div>Req: <strong>{entry.request_id || '-'}</strong></div>
                                            <div>Conta: <strong>{entry.login || 'não resolvida'}</strong></div>
                                            <div>Há: <strong>{formatSeconds(entry.idle_seconds)}</strong></div>
                                            <div className="col-span-2">IP: <strong>{entry.ip || '-'}</strong></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Últimas Requisições" subtitle="Eventos mais recentes gravados pela API para fechar o ciclo entre status, pool e entrega de cookies." icon="fas fa-stream" className="xl:col-span-7">
                            <div className="overflow-x-auto">
                                <table className="min-w-full text-sm">
                                    <thead>
                                        <tr className="text-left text-xs uppercase tracking-[0.14em] text-slate-400 border-b border-slate-100">
                                            <th className="pb-3 pr-4">Hora</th>
                                            <th className="pb-3 pr-4">Setor</th>
                                            <th className="pb-3 pr-4">Endpoint</th>
                                            <th className="pb-3 pr-4">Resultado</th>
                                            <th className="pb-3 pr-4">Solicitante</th>
                                            <th className="pb-3 pr-4">Req</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {recentRequests.length === 0 ? (
                                            <tr><td colSpan="6"><EmptyState text="Nenhuma requisição recente." /></td></tr>
                                        ) : null}
                                        {recentRequests.slice(0, 16).map((item, index) => (
                                            <tr key={`${item.ts || index}-${item.request_id || index}`} className="align-top">
                                                <td className="py-3 pr-4 text-slate-500 whitespace-nowrap">{item.ts_local || item.ts || '-'}</td>
                                                <td className="py-3 pr-4 font-bold text-slate-800">{item.setor || '-'}</td>
                                                <td className="py-3 pr-4 text-slate-600">{item.endpoint || '-'}</td>
                                                <td className="py-3 pr-4"><Pill tone={formatOutcomeTone(item.outcome)}>{item.outcome || '-'}</Pill></td>
                                                <td className="py-3 pr-4 text-slate-600">{item.requester_display_name || item.requester_username || '-'}</td>
                                                <td className="py-3 pr-4 font-mono text-xs text-slate-500">{item.request_id || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </SectionCard>
                    </div>
                </div>
            );
        };

        const AccountsView = ({ token, adSectors }) => {
            const [accounts, setAccounts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");
            const [statusFilter, setStatusFilter] = useState("");
            const [sectorFilter, setSectorFilter] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingAccount, setEditingAccount] = useState(null);

            const fetchAccounts = useCallback(async () => {
                try {
                    const data = await fetchJson('/api/admin/accounts', token);
                    setAccounts(data);
                } catch (e) {
                    console.error("Erro ao carregar contas:", e);
                } finally {
                    setLoading(false);
                }
            }, [token]);

            useEffect(() => {
                fetchAccounts();
                const interval = setInterval(fetchAccounts, 12000);
                return () => clearInterval(interval);
            }, [fetchAccounts]);

            const handleSaveAccount = async (payload) => {
                const url = payload.id ? `/api/admin/accounts/${payload.id}` : `/api/admin/accounts`;
                const method = payload.id ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, {
                        method,
                        headers: buildHeaders(token, { 'Content-Type': 'application/json' }),
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.erro || "Falha ao salvar conta.");
                    }
                    setIsModalOpen(false);
                    setEditingAccount(null);
                    fetchAccounts();
                } catch (e) {
                    alert(e.message || "Erro ao salvar conta.");
                }
            };

            const handleAction = async (action, id) => {
                if (action === 'delete' && !confirm("Remover esta conta permanentemente?")) return;
                if (action === 'clear' && !confirm("Expurgar a sessão desta conta?")) return;

                const url = action === 'delete' ? `/api/admin/accounts/${id}` : `/api/admin/accounts/${id}/clear`;
                const method = action === 'delete' ? 'DELETE' : 'POST';

                try {
                    const res = await fetch(url, { method, headers: buildHeaders(token) });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.erro || "Falha ao executar ação.");
                    fetchAccounts();
                } catch (e) {
                    alert(e.message || "Erro ao executar ação.");
                }
            };

            const statuses = useMemo(() => [...new Set(accounts.map((item) => (item.status || '').toLowerCase()).filter(Boolean))].sort(), [accounts]);

            const filteredAccounts = useMemo(() => {
                return accounts.filter((acc) => {
                    const safeStatus = (acc.status || '').toLowerCase();
                    const q = search.trim().toLowerCase();
                    if (statusFilter && safeStatus !== statusFilter) return false;
                    if (sectorFilter && !(acc.setores || []).includes(sectorFilter)) return false;
                    if (!q) return true;
                    return (
                        (acc.login || '').toLowerCase().includes(q) ||
                        (acc.titular || '').toLowerCase().includes(q)
                    );
                }).sort((a, b) => (a.login || '').localeCompare(b.login || ''));
            }, [accounts, search, statusFilter, sectorFilter]);

            const summary = useMemo(() => {
                const total = accounts.length;
                const active = accounts.filter((item) => ['ativo', 'active', 'provisoria_recebida', 'termo_assinado'].includes((item.status || '').toLowerCase())).length;
                const hot = accounts.filter((item) => item.cookie_hot).length;
                const backoff = accounts.filter((item) => Number(item.backoff_seconds) > 0).length;
                const shared = accounts.filter((item) => (item.setores || []).length > 1).length;
                return { total, active, hot, backoff, shared };
            }, [accounts]);

            return (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-black tracking-tight text-slate-900">Gerenciamento de Contas</h2>
                            <p className="text-slate-500 mt-1">Base de contas, status operacionais e saúde do pool por credencial.</p>
                        </div>
                        <button
                            onClick={() => { setEditingAccount(null); setIsModalOpen(true); }}
                            className="inline-flex items-center justify-center gap-2 rounded-2xl bg-blue-700 text-white px-5 py-3 font-bold hover:bg-blue-800"
                        >
                            <i className="fas fa-plus"></i> Nova conta
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
                        <KpiCard title="Total de Contas" value={summary.total} accent="blue" />
                        <KpiCard title="Contas Ativas" value={summary.active} accent="green" />
                        <KpiCard title="Sessões Quentes" value={summary.hot} accent="amber" />
                        <KpiCard title="Em Backoff" value={summary.backoff} accent="red" />
                        <KpiCard title="Compartilhadas" value={summary.shared} accent="purple" />
                    </div>

                    <SectionCard title="Filtros e Base de Contas" subtitle="Visualização limpa para operar sem misturar métricas do dia com cadastro." icon="fas fa-id-card">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-5">
                            <input
                                type="text"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                placeholder="Buscar por login ou titular"
                                className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                            />
                            <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500">
                                <option value="">Todos os status</option>
                                {statuses.map((status) => <option key={status} value={status}>{status.replace(/_/g, ' ')}</option>)}
                            </select>
                            <select value={sectorFilter} onChange={(e) => setSectorFilter(e.target.value)} className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500">
                                <option value="">Todos os setores</option>
                                {adSectors.map((sector) => <option key={sector} value={sector}>{sector}</option>)}
                            </select>
                            <button onClick={fetchAccounts} className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 font-bold text-slate-600 hover:bg-slate-100">
                                <i className="fas fa-rotate-right mr-2"></i>Atualizar
                            </button>
                        </div>

                        {loading ? <div className="py-16 text-center text-slate-400"><i className="fas fa-spinner fa-spin text-2xl"></i></div> : null}

                        {!loading ? (
                            <div className="overflow-x-auto">
                                <table className="min-w-full text-sm">
                                    <thead>
                                        <tr className="text-left text-xs uppercase tracking-[0.14em] text-slate-400 border-b border-slate-100">
                                            <th className="pb-3 pr-4">Conta</th>
                                            <th className="pb-3 pr-4">Setores</th>
                                            <th className="pb-3 pr-4">Status</th>
                                            <th className="pb-3 pr-4">Runtime</th>
                                            <th className="pb-3 pr-4">Último login</th>
                                            <th className="pb-3 pr-4 text-right">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredAccounts.length === 0 ? (
                                            <tr><td colSpan="6"><EmptyState text="Nenhuma conta encontrada com os filtros atuais." /></td></tr>
                                        ) : null}
                                        {filteredAccounts.map((acc) => (
                                            <tr key={acc.id} className="align-top">
                                                <td className="py-4 pr-4">
                                                    <div className="font-black text-slate-900">{acc.login}</div>
                                                    <div className="text-slate-500 mt-1">{acc.titular || 'Não informado'}</div>
                                                </td>
                                                <td className="py-4 pr-4">
                                                    <div className="flex flex-wrap gap-2 max-w-sm">
                                                        {(acc.setores || []).map((sector) => <Pill key={`${acc.id}-${sector}`} tone="blue">{sector}</Pill>)}
                                                    </div>
                                                </td>
                                                <td className="py-4 pr-4"><StatusBadge status={acc.status} /></td>
                                                <td className="py-4 pr-4">
                                                    <div className="space-y-2">
                                                        {acc.cookie_hot ? <Pill tone="green">quente por {formatMinutes(acc.cookie_age_minutes)}</Pill> : <Pill tone="gray">sem sessão quente</Pill>}
                                                        {Number(acc.backoff_seconds) > 0 ? <Pill tone="red">backoff {formatSeconds(acc.backoff_seconds)}</Pill> : null}
                                                        <div className="text-xs text-slate-500">{acc.cookie_count || 0} cookies salvos</div>
                                                    </div>
                                                </td>
                                                <td className="py-4 pr-4">
                                                    <div className="text-slate-700 font-semibold">{acc.last_login || 'Nunca conectou'}</div>
                                                    <div className="text-xs text-slate-500 mt-1 truncate max-w-[240px]">{acc.user_agent_used || 'Sem user-agent registrado'}</div>
                                                </td>
                                                <td className="py-4 text-right">
                                                    <div className="inline-flex items-center gap-2">
                                                        <button onClick={() => handleAction('clear', acc.id)} className="w-10 h-10 rounded-2xl bg-amber-50 text-amber-700 hover:bg-amber-100" title="Limpar sessão">
                                                            <i className="fas fa-eraser"></i>
                                                        </button>
                                                        <button onClick={() => { setEditingAccount(acc); setIsModalOpen(true); }} className="w-10 h-10 rounded-2xl bg-blue-50 text-blue-700 hover:bg-blue-100" title="Editar conta">
                                                            <i className="fas fa-pen"></i>
                                                        </button>
                                                        <button onClick={() => handleAction('delete', acc.id)} className="w-10 h-10 rounded-2xl bg-rose-50 text-rose-700 hover:bg-rose-100" title="Excluir conta">
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : null}
                    </SectionCard>

                    <AccountModal
                        isOpen={isModalOpen}
                        onClose={() => { setIsModalOpen(false); setEditingAccount(null); }}
                        onSave={handleSaveAccount}
                        accountData={editingAccount}
                        adSectors={adSectors}
                        token={token}
                    />
                </div>
            );
        };

        const HistoryView = ({ token }) => {
            const [dates, setDates] = useState({
                start: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                end: new Date().toISOString().split('T')[0]
            });
            const [data, setData] = useState(null);
            const [errorImages, setErrorImages] = useState([]);
            const [auditEvents, setAuditEvents] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchPageData = useCallback(async () => {
                setLoading(true);
                try {
                    const [analyticsData, imagesData, auditData] = await Promise.all([
                        fetchJson(`/api/admin/analytics?start=${dates.start}&end=${dates.end}`, token),
                        fetchJson('/api/admin/error_images', token),
                        fetchJson('/api/admin/audit?limit=80', token)
                    ]);
                    setData(analyticsData);
                    setErrorImages(imagesData);
                    setAuditEvents(auditData);
                } catch (e) {
                    console.error("Erro ao carregar histórico:", e);
                } finally {
                    setLoading(false);
                }
            }, [token, dates.start, dates.end]);

            useEffect(() => {
                fetchPageData();
            }, [fetchPageData]);

            if (loading || !data) {
                return <div className="py-20 text-center text-slate-400"><i className="fas fa-spinner fa-spin text-3xl"></i></div>;
            }

            const efficiency = data.efficiency || {};
            const robotsPerformance = data.robots_performance || [];
            const errorDiagnostics = data.error_diagnostics || [];
            const sectorsData = data.sectors || [];
            const accountsData = data.accounts || [];
            const requestEndpoints = data.request_endpoints || [];
            const requestOutcomes = data.request_outcomes || [];

            return (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-black tracking-tight text-slate-900">Histórico e Analytics</h2>
                            <p className="text-slate-500 mt-1">Leitura consolidada do período, auditoria administrativa e galeria de erros.</p>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-3xl shadow-sm p-4 flex flex-col md:flex-row gap-3">
                            <div>
                                <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Início</label>
                                <input type="date" value={dates.start} onChange={(e) => setDates({ ...dates, start: e.target.value })} className="mt-2 rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500" />
                            </div>
                            <div>
                                <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Fim</label>
                                <input type="date" value={dates.end} onChange={(e) => setDates({ ...dates, end: e.target.value })} className="mt-2 rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500" />
                            </div>
                            <button onClick={fetchPageData} className="self-end rounded-2xl bg-blue-700 text-white px-5 py-3 font-bold hover:bg-blue-800">
                                <i className="fas fa-magnifying-glass-chart mr-2"></i>Filtrar
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
                        <KpiCard title="Acessos no Período" value={efficiency.total_logins_requested || 0} accent="blue" />
                        <KpiCard title="Cookies Fornecidos" value={efficiency.total_cookies_injected || 0} accent="green" />
                        <KpiCard title="Economia do Pool" value={`${efficiency.economia_pct || 0}%`} accent="purple" />
                        <KpiCard title="Idade Média do Cookie" value={formatMinutes(efficiency.avg_cookie_age_minutes)} accent="amber" />
                        <KpiCard title="Ciclo Médio / Pico" value={formatMinutes(efficiency.avg_session_cycle_minutes)} subtitle={`pico ${formatMinutes(efficiency.max_session_cycle_minutes)}`} accent="red" />
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        <SectionCard title="Saúde da Frota" subtitle="Sucessos e falhas por robô no período selecionado." icon="fas fa-robot" className="xl:col-span-4">
                            <div className="space-y-3">
                                {robotsPerformance.length === 0 ? <EmptyState text="Sem dados de robôs no período." /> : null}
                                {robotsPerformance.map((robot) => (
                                    <div key={robot.name} className="rounded-2xl border border-slate-200 bg-slate-50 p-4 flex items-center justify-between gap-4">
                                        <div>
                                            <div className="font-black text-slate-900">{robot.name}</div>
                                            <div className="text-sm text-slate-500 mt-1">{robot.success} sucessos / {robot.error} falhas</div>
                                        </div>
                                        <Pill tone={robot.success_rate >= 80 ? 'green' : robot.success_rate >= 50 ? 'amber' : 'red'}>
                                            {robot.success_rate}%
                                        </Pill>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Diagnóstico de Falhas" subtitle="Motivos mais frequentes registrados pelo backend." icon="fas fa-triangle-exclamation" className="xl:col-span-4">
                            <div className="space-y-3">
                                {errorDiagnostics.length === 0 ? <EmptyState text="Nenhum erro registrado no período." /> : null}
                                {errorDiagnostics.map((item) => (
                                    <div key={item.reason} className="rounded-2xl border border-slate-200 p-4 flex items-center justify-between gap-4">
                                        <div className="text-sm text-slate-700">{item.reason}</div>
                                        <Pill tone="red">{item.count}</Pill>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Auditoria Admin" subtitle="Últimas ações administrativas no painel." icon="fas fa-user-check" className="xl:col-span-4">
                            <div className="space-y-3 max-h-[420px] overflow-y-auto custom-scroll pr-1">
                                {auditEvents.length === 0 ? <EmptyState text="Nenhum evento de auditoria encontrado." /> : null}
                                {auditEvents.map((item, index) => (
                                    <div key={`${item.ts || index}-${item.action || index}`} className="rounded-2xl border border-slate-200 p-4">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="font-black text-slate-900">{item.action || 'ação'}</div>
                                            <div className="text-xs text-slate-400">{item.ts_local || item.ts || '-'}</div>
                                        </div>
                                        <div className="text-sm text-slate-600 mt-2">Ator: <strong>{item.actor || '-'}</strong></div>
                                        <div className="text-sm text-slate-600">Alvo: <strong>{item.target || '-'}</strong></div>
                                        <div className="text-xs text-slate-500 mt-2">IP: {item.ip || '-'}</div>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        <SectionCard title="Endpoints Mais Chamados" subtitle="Distribuição por rota para entender onde a API foi mais acionada." icon="fas fa-route" className="xl:col-span-4">
                            <div className="space-y-3">
                                {requestEndpoints.length === 0 ? <EmptyState text="Sem dados de endpoint." /> : null}
                                {requestEndpoints.map((item) => (
                                    <div key={item.name} className="rounded-2xl border border-slate-200 p-4 flex items-center justify-between gap-4">
                                        <div className="font-bold text-slate-800">{item.name}</div>
                                        <Pill tone="blue">{item.count}</Pill>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Resultados das Requisições" subtitle="O que as chamadas retornaram ao longo do período." icon="fas fa-filter-circle-dollar" className="xl:col-span-4">
                            <div className="space-y-3">
                                {requestOutcomes.length === 0 ? <EmptyState text="Sem dados de resultado." /> : null}
                                {requestOutcomes.map((item) => (
                                    <div key={item.name} className="rounded-2xl border border-slate-200 p-4 flex items-center justify-between gap-4">
                                        <div className="font-bold text-slate-800">{item.name}</div>
                                        <Pill tone={formatOutcomeTone(item.name)}>{item.count}</Pill>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Galeria de Erros" subtitle="Snapshots recentes salvos pelo modo debug." icon="fas fa-camera" className="xl:col-span-4" action={
                            <button onClick={fetchPageData} className="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50">
                                <i className="fas fa-rotate-right mr-2"></i>Atualizar
                            </button>
                        }>
                            {errorImages.length === 0 ? <EmptyState text="Nenhuma imagem de erro encontrada." /> : null}
                            {errorImages.length > 0 ? (
                                <div className="grid grid-cols-2 gap-3">
                                    {errorImages.slice(0, 8).map((img) => (
                                        <a key={img.name} href={img.url} target="_blank" rel="noreferrer" className="block rounded-2xl overflow-hidden border border-slate-200 bg-slate-50 hover:shadow-md transition">
                                            <img src={img.url} alt={img.name} className="w-full h-28 object-cover" />
                                            <div className="p-3">
                                                <div className="text-xs font-black text-slate-800 truncate">{img.name}</div>
                                                <div className="text-[11px] text-slate-500 mt-1">{img.date_str}</div>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            ) : null}
                        </SectionCard>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        <SectionCard title="Ranking de Uso por Setor" subtitle="Setores mais demandantes no período selecionado." icon="fas fa-chart-column">
                            <div className="space-y-3">
                                {sectorsData.length === 0 ? <EmptyState text="Sem ranking de setores." /> : null}
                                {sectorsData.map((item) => (
                                    <div key={item.name} className="rounded-2xl border border-slate-200 p-4">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="font-bold text-slate-800 truncate">{item.name}</div>
                                            <div className="text-sm font-black text-blue-700">{item.count}</div>
                                        </div>
                                        <div className="mt-3 h-2 rounded-full bg-slate-100 overflow-hidden">
                                            <div className="h-full bg-blue-500 rounded-full" style={{ width: `${Math.min(100, ((item.count || 0) / Math.max(1, sectorsData[0]?.count || 1)) * 100)}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Ranking de Uso por Conta" subtitle="Credenciais mais acionadas no período selecionado." icon="fas fa-key">
                            <div className="space-y-3">
                                {accountsData.length === 0 ? <EmptyState text="Sem ranking de contas." /> : null}
                                {accountsData.map((item) => (
                                    <div key={item.name} className="rounded-2xl border border-slate-200 p-4">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="font-bold text-slate-800 truncate">{item.name}</div>
                                            <div className="text-sm font-black text-emerald-700">{item.count}</div>
                                        </div>
                                        <div className="mt-3 h-2 rounded-full bg-slate-100 overflow-hidden">
                                            <div className="h-full bg-emerald-500 rounded-full" style={{ width: `${Math.min(100, ((item.count || 0) / Math.max(1, accountsData[0]?.count || 1)) * 100)}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>
                    </div>
                </div>
            );
        };

        const LogsView = ({ token }) => {
            const [source, setSource] = useState('combined');
            const [day, setDay] = useState(getTodayInputValue());
            const [contains, setContains] = useState('');
            const [limit, setLimit] = useState(180);
            const [autoRefresh, setAutoRefresh] = useState(true);
            const [data, setData] = useState({ generated_at: '', items: [] });
            const [loading, setLoading] = useState(true);

            const fetchLogs = useCallback(async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({
                        source,
                        day,
                        limit: String(limit),
                    });
                    if (contains.trim()) params.set('contains', contains.trim());
                    const result = await fetchJson(`/api/admin/logs/live?${params.toString()}`, token);
                    setData(result);
                } catch (e) {
                    console.error("Erro ao carregar logs:", e);
                } finally {
                    setLoading(false);
                }
            }, [token, source, day, contains, limit]);

            useEffect(() => {
                fetchLogs();
            }, [fetchLogs]);

            useEffect(() => {
                if (!autoRefresh) return undefined;
                const interval = setInterval(fetchLogs, 4000);
                return () => clearInterval(interval);
            }, [autoRefresh, fetchLogs]);

            const handleDownload = async () => {
                try {
                    const params = new URLSearchParams({
                        source,
                        day,
                    });
                    if (contains.trim()) params.set('contains', contains.trim());
                    const res = await fetch(`/api/admin/logs/download?${params.toString()}`, {
                        headers: buildHeaders(token)
                    });
                    if (!res.ok) throw new Error('Falha ao baixar logs.');
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.download = `onelog_${source}_${day}.log`;
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    window.URL.revokeObjectURL(url);
                } catch (e) {
                    alert(e.message || "Não foi possível baixar o log.");
                }
            };

            const sourceTone = (itemSource) => itemSource === 'worker' ? 'amber' : itemSource === 'api' ? 'blue' : 'gray';

            return (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-black tracking-tight text-slate-900">Logs</h2>
                            <p className="text-slate-500 mt-1">Leitura em tempo real e download fragmentado por dia, juntando worker e API.</p>
                        </div>
                        <div className="text-sm text-slate-500 bg-white border border-slate-200 rounded-2xl px-4 py-3 shadow-sm">
                            Última leitura em <strong>{data.generated_at || '-'}</strong>
                        </div>
                    </div>

                    <SectionCard title="Leitor de Logs" subtitle="Use filtros simples para focar no dia, origem e palavras-chave do incidente." icon="fas fa-terminal" action={
                        <div className="flex items-center gap-2">
                            <button onClick={fetchLogs} className="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50">
                                <i className="fas fa-rotate-right mr-2"></i>Atualizar
                            </button>
                            <button onClick={handleDownload} className="rounded-2xl bg-blue-700 text-white px-4 py-2 text-sm font-bold hover:bg-blue-800">
                                <i className="fas fa-download mr-2"></i>Baixar
                            </button>
                        </div>
                    }>
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mb-5">
                            <select value={source} onChange={(e) => setSource(e.target.value)} className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500">
                                <option value="combined">Worker + API</option>
                                <option value="worker">Apenas worker</option>
                                <option value="api">Apenas API</option>
                            </select>
                            <input type="date" value={day} onChange={(e) => setDay(e.target.value)} className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500" />
                            <input
                                type="text"
                                value={contains}
                                onChange={(e) => setContains(e.target.value)}
                                placeholder="Filtrar por texto"
                                className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500 md:col-span-2"
                            />
                            <select value={limit} onChange={(e) => setLimit(Number(e.target.value))} className="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500">
                                {[80, 120, 180, 300, 500].map((item) => <option key={item} value={item}>{item} linhas</option>)}
                            </select>
                        </div>

                        <div className="flex flex-wrap items-center gap-3 mb-5">
                            <label className="inline-flex items-center gap-2 text-sm text-slate-600">
                                <input type="checkbox" checked={autoRefresh} onChange={(e) => setAutoRefresh(e.target.checked)} />
                                Atualização automática
                            </label>
                            <Pill tone="gray">{(data.items || []).length} linhas exibidas</Pill>
                            <Pill tone="blue">{source === 'combined' ? 'fontes combinadas' : source}</Pill>
                            <Pill tone="amber">{day}</Pill>
                        </div>

                        <div className="rounded-3xl border border-slate-200 bg-slate-950 text-slate-200 p-4 h-[620px] overflow-auto custom-scroll">
                            {loading ? <div className="text-sm text-slate-400"><i className="fas fa-spinner fa-spin mr-2"></i>Atualizando logs...</div> : null}
                            {!loading && (!data.items || data.items.length === 0) ? <div className="text-sm text-slate-400">Nenhuma linha encontrada para o filtro atual.</div> : null}
                            <div className="space-y-2">
                                {(data.items || []).map((item, index) => (
                                    <div key={`${item.ts || index}-${index}`} className="font-mono text-[12px] leading-6 border-b border-slate-800 pb-2">
                                        <div className="flex flex-wrap items-center gap-2 mb-1">
                                            <Pill tone={sourceTone(item.source)}>{item.source}</Pill>
                                            <span className="text-slate-500">{item.ts}</span>
                                        </div>
                                        <div className="break-all text-slate-100">{item.message || item.line}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </SectionCard>
                </div>
            );
        };

        const App = () => {
            const [token, setToken] = useState("");
            const [adminUser, setAdminUser] = useState(null);
            const [activeTab, setActiveTab] = useState("operations");
            const [adSectors, setAdSectors] = useState([]);

            const tabs = [
                { id: 'operations', label: 'Operação Hoje', icon: 'fas fa-satellite-dish', description: 'métricas do dia e tempo real' },
                { id: 'accounts', label: 'Contas', icon: 'fas fa-id-card', description: 'gerenciamento e runtime' },
                { id: 'history', label: 'Histórico', icon: 'fas fa-chart-line', description: 'analytics e auditoria' },
                { id: 'logs', label: 'Logs', icon: 'fas fa-terminal', description: 'tempo real e download' },
            ];

            const handleLogin = async ({ username, password }) => {
                try {
                    const loginRes = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const loginData = await loginRes.json();
                    if (!loginRes.ok) {
                        return { ok: false, message: loginData.erro || "Acesso negado." };
                    }
                    const sectors = await fetchJson('/api/admin/ad_sectors', loginData.token);
                    setToken(loginData.token);
                    setAdminUser(loginData.user || null);
                    setAdSectors(sectors);
                    setActiveTab('operations');
                    return { ok: true };
                } catch (e) {
                    return { ok: false, message: "Erro ao conectar com o servidor." };
                }
            };

            const handleLogout = async () => {
                try {
                    if (token) {
                        await fetch('/api/admin/logout', { method: 'POST', headers: buildHeaders(token) });
                    }
                } catch (e) {
                    console.error("Erro ao encerrar sessão:", e);
                } finally {
                    setToken("");
                    setAdminUser(null);
                    setAdSectors([]);
                    setActiveTab('operations');
                }
            };

            if (!token) return <AuthScreen onLogin={handleLogin} />;

            return (
                <div className="min-h-screen">
                    <header className="bg-slate-950 text-white border-b border-slate-800">
                        <div className="max-w-[1600px] mx-auto px-6 py-5 flex flex-col xl:flex-row xl:items-center xl:justify-between gap-4">
                            <div>
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 rounded-2xl bg-blue-600/20 text-blue-300 flex items-center justify-center text-xl">
                                        <i className="fas fa-robot"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-black tracking-tight">OneLog Control Center</h1>
                                        <p className="text-sm text-slate-400 mt-1">Operação, contas, histórico e logs em superfícies separadas.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <div className="text-sm font-bold">{(adminUser && adminUser.display_name) || (adminUser && adminUser.username) || 'Administrador'}</div>
                                    <div className="text-xs text-slate-400">{(adminUser && adminUser.username) || ''}</div>
                                </div>
                                <button onClick={handleLogout} className="rounded-2xl bg-slate-800 hover:bg-slate-700 px-4 py-2.5 text-sm font-bold">
                                    Sair do painel
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto px-6 py-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 mb-6">
                            {tabs.map((tab) => {
                                const active = activeTab === tab.id;
                                return (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`text-left rounded-3xl border p-4 transition ${active ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}
                                    >
                                        <div className="flex items-center justify-between gap-3">
                                            <div className={`w-11 h-11 rounded-2xl flex items-center justify-center ${active ? 'bg-white/10 text-blue-200' : 'bg-slate-100 text-slate-500'}`}>
                                                <i className={tab.icon}></i>
                                            </div>
                                            {active ? <Pill tone="blue">ativa</Pill> : null}
                                        </div>
                                        <div className={`mt-4 font-black text-lg ${active ? 'text-white' : 'text-slate-900'}`}>{tab.label}</div>
                                        <div className={`text-sm mt-1 ${active ? 'text-slate-300' : 'text-slate-500'}`}>{tab.description}</div>
                                    </button>
                                );
                            })}
                        </div>

                        {activeTab === 'operations' ? <OperationView token={token} /> : null}
                        {activeTab === 'accounts' ? <AccountsView token={token} adSectors={adSectors} /> : null}
                        {activeTab === 'history' ? <HistoryView token={token} /> : null}
                        {activeTab === 'logs' ? <LogsView token={token} /> : null}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
