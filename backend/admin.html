<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneLog - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const formatSeconds = (value) => {
            if (value === null || value === undefined || value === '') return '-';
            const total = Number(value);
            if (!Number.isFinite(total) || total <= 0) return '0s';
            const hours = Math.floor(total / 3600);
            const minutes = Math.floor((total % 3600) / 60);
            const seconds = total % 60;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        };

        const formatMinutes = (value) => {
            if (value === null || value === undefined || value === '') return '-';
            const num = Number(value);
            if (!Number.isFinite(num)) return '-';
            return `${num.toFixed(1)} min`;
        };

        const getTodayInputValue = () => {
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            return local.toISOString().split('T')[0];
        };

        const buildHeaders = (token, extra = {}) => ({
            ...(token ? { 'X-Admin-Token': token } : {}),
            ...extra
        });

        const fetchJson = async (url, token) => {
            const res = await fetch(url, { headers: buildHeaders(token) });
            if (!res.ok) {
                let message = 'Falha na requisição.';
                try {
                    const data = await res.json();
                    message = data.erro || data.message || message;
                } catch (e) {}
                throw new Error(message);
            }
            return res.json();
        };

        const toneMap = {
            green: 'bg-emerald-50 text-emerald-700 border-emerald-200',
            blue: 'bg-blue-50 text-blue-700 border-blue-200',
            amber: 'bg-amber-50 text-amber-700 border-amber-200',
            red: 'bg-red-50 text-red-700 border-red-200',
            gray: 'bg-slate-100 text-slate-700 border-slate-200',
            purple: 'bg-violet-50 text-violet-700 border-violet-200',
        };

        const SectionCard = ({ title, subtitle, icon, action, children, className = '' }) => (
            <section className={`bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden ${className}`}>
                <div className="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-4">
                    <div>
                        <div className="flex items-center gap-3">
                            {icon && <span className="w-10 h-10 rounded-2xl bg-slate-100 text-slate-600 flex items-center justify-center"><i className={icon}></i></span>}
                            <div>
                                <h3 className="text-lg font-bold text-slate-900">{title}</h3>
                                {subtitle && <p className="text-sm text-slate-500 mt-0.5">{subtitle}</p>}
                            </div>
                        </div>
                    </div>
                    {action}
                </div>
                <div className="p-5">{children}</div>
            </section>
        );

        const KpiCard = ({ title, value, subtitle, accent = 'blue' }) => {
            const accents = {
                blue: 'from-blue-500 to-cyan-400',
                green: 'from-emerald-500 to-green-400',
                amber: 'from-amber-500 to-yellow-400',
                purple: 'from-violet-500 to-fuchsia-400',
                red: 'from-rose-500 to-orange-400',
                slate: 'from-slate-600 to-slate-400',
            };
            return (
                <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                    <div className={`h-1.5 bg-gradient-to-r ${accents[accent] || accents.blue}`}></div>
                    <div className="p-5">
                        <div className="text-[11px] font-black uppercase tracking-[0.16em] text-slate-400">{title}</div>
                        <div className="mt-4 flex items-end justify-between gap-4">
                            <div className="text-4xl font-black tracking-tight text-slate-900">{value}</div>
                            {subtitle ? <div className="text-xs font-semibold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">{subtitle}</div> : null}
                        </div>
                    </div>
                </div>
            );
        };

        const Pill = ({ children, tone = 'gray' }) => (
            <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-bold border uppercase tracking-wide ${toneMap[tone] || toneMap.gray}`}>
                {children}
            </span>
        );

        const StatusBadge = ({ status }) => {
            const value = (status || 'desconhecido').toLowerCase();
            if (['ativo', 'active', 'provisoria_recebida', 'termo_assinado'].includes(value)) return <Pill tone="green">{value.replace(/_/g, ' ')}</Pill>;
            if (value === 'bloqueada') return <Pill tone="red">{value}</Pill>;
            if (value === 'cadastro_inicial') return <Pill tone="amber">{value.replace(/_/g, ' ')}</Pill>;
            return <Pill tone="gray">{value.replace(/_/g, ' ')}</Pill>;
        };

        const EmptyState = ({ text }) => (
            <div className="py-10 text-center text-sm text-slate-400">{text}</div>
        );

        const formatOutcomeTone = (outcome) => {
            const value = (outcome || '').toLowerCase();
            if (value.includes('returned') || value.includes('hot') || value.includes('hit')) return 'green';
            if (value.includes('queued') || value.includes('awaiting')) return 'amber';
            if (value.includes('denied') || value.includes('error') || value.includes('not_found')) return 'red';
            return 'gray';
        };

        const formatWorkerTone = (state) => {
            const value = (state || '').toLowerCase();
            if (value === 'idle') return 'gray';
            if (value === 'running') return 'blue';
            if (value.includes('cooldown')) return 'amber';
            if (value === 'error') return 'red';
            return 'purple';
        };

        const AuthScreen = ({ onLogin }) => {
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");
                const result = await onLogin({ username, password });
                if (!result.ok) setError(result.message || "Acesso negado.");
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center px-4">
                    <div className="w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-xl p-8">
                        <div className="w-16 h-16 rounded-2xl bg-blue-100 text-blue-700 flex items-center justify-center text-2xl mx-auto">
                            <i className="fas fa-user-shield"></i>
                        </div>
                        <h1 className="text-center text-2xl font-black text-slate-900 mt-5">Painel Administrativo</h1>
                        <p className="text-center text-sm text-slate-500 mt-2">Acesso restrito a administradores do domínio.</p>
                        <form onSubmit={handleSubmit} className="mt-8 space-y-4">
                            <input
                                type="text"
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                placeholder="Usuário do Windows"
                                className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                            />
                            <input
                                type="password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                placeholder="Senha do Windows"
                                className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                            />
                            {error ? <div className="text-sm font-semibold text-red-600">{error}</div> : null}
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full rounded-2xl bg-blue-700 text-white py-3 font-bold hover:bg-blue-800 transition disabled:opacity-60"
                            >
                                {loading ? 'Validando acesso...' : 'Entrar com AD'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const AccountModal = ({ isOpen, onClose, onSave, accountData, adSectors, token }) => {
            const emptyForm = {
                id: '',
                login: '',
                titular: '',
                senha: '',
                status: 'cadastro_inicial',
                status_custom: '',
                data_validade: '',
                status_updated_at: '',
                setores: []
            };
            const [formData, setFormData] = useState(emptyForm);
            const [showPassword, setShowPassword] = useState(false);
            const [passwordRevealed, setPasswordRevealed] = useState(false);
            const [revealingPassword, setRevealingPassword] = useState(false);

            useEffect(() => {
                if (!isOpen) return;
                if (accountData) {
                    const currentStatus = accountData.status || 'ativo';
                    const customStatus = ['ativo', 'bloqueada', 'cadastro_inicial'].includes(currentStatus) ? '' : currentStatus;
                    setFormData({
                        id: accountData.id,
                        login: accountData.login,
                        titular: accountData.titular === "Não informado" ? "" : accountData.titular,
                        senha: "",
                        status: currentStatus,
                        status_custom: customStatus,
                        data_validade: accountData.data_validade || '',
                        status_updated_at: accountData.status_updated_at ? accountData.status_updated_at.split('T')[0] : '',
                        setores: accountData.setores || []
                    });
                } else {
                    setFormData(emptyForm);
                }
                setShowPassword(false);
                setPasswordRevealed(false);
                setRevealingPassword(false);
            }, [isOpen, accountData]);

            if (!isOpen) return null;

            const isCustomStatus = !['ativo', 'bloqueada', 'cadastro_inicial', '_custom_'].includes(formData.status);

            const handleSectorToggle = (sector) => {
                setFormData((prev) => ({
                    ...prev,
                    setores: prev.setores.includes(sector)
                        ? prev.setores.filter((item) => item !== sector)
                        : [...prev.setores, sector]
                }));
            };

            const handleRevealPassword = async () => {
                if (!formData.id) return;
                if (!confirm("Revelar a senha desta conta agora? Esta ação ficará auditada.")) return;
                setRevealingPassword(true);
                try {
                    const data = await fetchJson(`/api/admin/accounts/${formData.id}/secret`, token);
                    setFormData((prev) => ({ ...prev, senha: data.senha || "" }));
                    setPasswordRevealed(true);
                    setShowPassword(true);
                } catch (e) {
                    alert(e.message || "Não foi possível revelar a senha.");
                } finally {
                    setRevealingPassword(false);
                }
            };

            const handleSubmit = () => {
                let finalStatus = formData.status;
                if (finalStatus === "_custom_" || isCustomStatus) {
                    finalStatus = (formData.status_custom || formData.status || '').trim().toLowerCase().replace(/ /g, '_');
                    if (!finalStatus) {
                        alert("Digite o status personalizado.");
                        return;
                    }
                }
                if (!formData.login) {
                    alert("O login é obrigatório.");
                    return;
                }
                if (!formData.id && !formData.senha) {
                    alert("A senha é obrigatória para contas novas.");
                    return;
                }
                onSave({ ...formData, status: finalStatus });
            };

            return (
                <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                        <div className="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-black text-slate-900">{formData.id ? 'Editar Conta BB' : 'Nova Conta BB'}</h3>
                                <p className="text-sm text-slate-500 mt-1">Gerencie status, senha e setores autorizados.</p>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-2xl bg-slate-100 text-slate-500 hover:bg-slate-200">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>

                        <div className="p-6 max-h-[75vh] overflow-y-auto custom-scroll space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Login</label>
                                    <input
                                        type="text"
                                        value={formData.login}
                                        onChange={(e) => setFormData({ ...formData, login: e.target.value.toUpperCase() })}
                                        disabled={!!formData.id}
                                        className={`mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 font-mono outline-none focus:border-blue-500 ${formData.id ? 'bg-slate-50 text-slate-500' : ''}`}
                                        placeholder="Ex: F1234567"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Titular</label>
                                    <input
                                        type="text"
                                        value={formData.titular}
                                        onChange={(e) => setFormData({ ...formData, titular: e.target.value })}
                                        className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                                        placeholder="Nome completo"
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Senha do Banco do Brasil</label>
                                <div className="mt-2 relative">
                                    <input
                                        type={showPassword ? "text" : "password"}
                                        value={formData.senha}
                                        onChange={(e) => setFormData({ ...formData, senha: e.target.value })}
                                        className="w-full rounded-2xl border border-slate-200 px-4 py-3 pr-24 font-mono outline-none focus:border-blue-500"
                                        placeholder={formData.id ? "Deixe em branco para manter a atual" : "Digite a senha"}
                                    />
                                    <div className="absolute inset-y-0 right-2 flex items-center gap-1">
                                        {formData.id ? (
                                            <button type="button" onClick={handleRevealPassword} disabled={revealingPassword} className="w-10 h-10 rounded-xl text-slate-500 hover:bg-slate-100 disabled:opacity-50" title="Revelar senha">
                                                <i className={`fas ${revealingPassword ? 'fa-spinner fa-spin' : 'fa-key'}`}></i>
                                            </button>
                                        ) : null}
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="w-10 h-10 rounded-xl text-slate-500 hover:bg-slate-100" title="Exibir senha">
                                            <i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                        </button>
                                    </div>
                                </div>
                                {formData.id && !passwordRevealed ? <div className="mt-2 text-xs text-slate-500">A senha não é carregada por padrão.</div> : null}
                                {passwordRevealed ? <div className="mt-2 text-xs font-semibold text-amber-600">Senha revelada sob auditoria.</div> : null}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Status</label>
                                    <select
                                        value={isCustomStatus ? "_custom_" : formData.status}
                                        onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                        className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                                    >
                                        <option value="ativo">Ativo</option>
                                        <option value="bloqueada">Bloqueada</option>
                                        <option value="cadastro_inicial">Cadastro inicial</option>
                                        <option value="_custom_">Outro...</option>
                                    </select>
                                    {(formData.status === "_custom_" || isCustomStatus) ? (
                                        <input
                                            type="text"
                                            value={formData.status_custom}
                                            onChange={(e) => setFormData({ ...formData, status_custom: e.target.value })}
                                            className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                                            placeholder="Digite o novo status"
                                        />
                                    ) : null}
                                </div>
                                <div>
                                    <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Vencimento</label>
                                    <input
                                        type="date"
                                        value={formData.data_validade}
                                        onChange={(e) => setFormData({ ...formData, data_validade: e.target.value })}
                                        className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Status modificado em</label>
                                    <input
                                        type="date"
                                        value={formData.status_updated_at}
                                        onChange={(e) => setFormData({ ...formData, status_updated_at: e.target.value })}
                                        className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-blue-500"
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Setores autorizados</label>
                                <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 max-h-56 overflow-y-auto custom-scroll rounded-3xl border border-slate-200 bg-slate-50 p-3">
                                    {adSectors.map((sector) => (
                                        <label key={sector} className="flex items-center gap-3 bg-white rounded-2xl border border-slate-200 px-3 py-2 cursor-pointer hover:border-blue-300">
                                            <input
                                                type="checkbox"
                                                checked={formData.setores.includes(sector)}
                                                onChange={() => handleSectorToggle(sector)}
                                                className="h-4 w-4"
                                            />
                                            <span className="text-sm text-slate-700 truncate">{sector}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                            <button onClick={onClose} className="px-5 py-2.5 rounded-2xl border border-slate-200 font-bold text-slate-600 hover:bg-white">Cancelar</button>
                            <button onClick={handleSubmit} className="px-6 py-2.5 rounded-2xl bg-blue-700 text-white font-bold hover:bg-blue-800">
                                <i className="fas fa-save mr-2"></i>Salvar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const OperationView = ({ token }) => {
            const [stats, setStats] = useState({});
            const [liveOverview, setLiveOverview] = useState({ workers: [], active_users: [], hot_sessions: [], backoff_accounts: [], queue: {} });
            const [recentRequests, setRecentRequests] = useState([]);
            const [syncPressure, setSyncPressure] = useState({ totals: {}, sectors: [] });
            const [loading, setLoading] = useState(true);

            const fetchData = useCallback(async () => {
                try {
                    const [statsData, liveData, recentData, pressureData] = await Promise.all([
                        fetchJson('/api/admin/dashboard_stats', token),
                        fetchJson('/api/admin/live_overview', token),
                        fetchJson('/api/admin/recent_requests?limit=40', token),
                        fetchJson('/api/admin/sync_pressure?minutes=30', token)
                    ]);
                    setStats(statsData);
                    setLiveOverview(liveData);
                    setRecentRequests(recentData);
                    setSyncPressure(pressureData);
                } catch (e) {
                    console.error("Erro ao carregar operação do dia:", e);
                } finally {
                    setLoading(false);
                }
            }, [token]);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 5000);
                return () => clearInterval(interval);
            }, [fetchData]);

            if (loading) {
                return <div className="py-20 text-center text-slate-400"><i className="fas fa-spinner fa-spin text-3xl"></i></div>;
            }

            const queueSnapshot = stats.queue_snapshot || {};

            return (
                <div className="space-y-6">
                    <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-black tracking-tight text-slate-900">Operação de Hoje</h2>
                            <p className="text-slate-500 mt-1">Resumo vivo do pool, dos workers e da pressão de sincronização.</p>
                        </div>
                        <div className="text-sm text-slate-500 bg-white border border-slate-200 rounded-2xl px-4 py-3 shadow-sm">
                            Atualizado em <strong>{liveOverview.generated_at || '-'}</strong>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-4">
                        <KpiCard title="Acessos Solicitados" value={stats.logins_solicitados || 0} accent="blue" />
                        <KpiCard title="Cookies Entregues" value={stats.cookies_injetados || 0} accent="green" />
                        <KpiCard title="Usuários Ativos Agora" value={stats.active_users_now || 0} accent="purple" />
                        <KpiCard title="Sessões Quentes" value={stats.hot_pool_accounts || 0} subtitle={`${stats.queue_size || 0} na fila`} accent="amber" />
                        <KpiCard title="Workers" value={`${stats.workers_busy || 0}/${stats.workers_total || 0}`} subtitle="ocupados" accent="red" />
                        <KpiCard title="Eficiência do Pool" value={`${stats.economia_pct || 0}%`} subtitle={`cookie ${formatMinutes(stats.avg_cookie_age)}`} accent="slate" />
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        <SectionCard title="Workers em Tempo Real" subtitle="Estado atual de cada robô e contexto da última tarefa." icon="fas fa-robot" className="xl:col-span-5">
                            <div className="space-y-3">
                                {(liveOverview.workers || []).length === 0 ? <EmptyState text="Sem telemetria de workers no momento." /> : null}
                                {(liveOverview.workers || []).map((worker) => (
                                    <div key={worker.thread_id} className="rounded-3xl border border-slate-200 bg-slate-50 p-4">
                                        <div className="flex items-start justify-between gap-3">
                                            <div>
                                                <div className="text-base font-black text-slate-900">ROBÔ {worker.thread_id}</div>
                                                <div className="text-sm text-slate-600 mt-1">{worker.message || 'Sem mensagem'}</div>
                                            </div>
                                            <Pill tone={formatWorkerTone(worker.state)}>{worker.state || 'idle'}</Pill>
                                        </div>
                                        <div className="mt-3 grid grid-cols-2 gap-2 text-xs text-slate-500">
                                            <div>Setor: <strong>{worker.setor || '-'}</strong></div>
                                            <div>Conta: <strong>{worker.account_id || '-'}</strong></div>
                                            <div>Solicitante: <strong>{worker.requester_display_name || worker.requester_username || '-'}</strong></div>
                                            <div>Req: <strong>{worker.request_id || '-'}</strong></div>
                                            <div>Atualização: <strong>{formatSeconds(worker.stale_seconds)}</strong></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </SectionCard>

                        <SectionCard title="Sessões, Fila e Backoff" subtitle="Panorama operacional do pool e das contas em espera." icon="fas fa-layer-group" className="xl:col-span-4">
                            <div className="grid grid-cols-2 gap-3 mb-5">
                                <div className="rounded-3xl bg-slate-50 border border-slate-200 p-4">
                                    <div className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Fila padrão</div>

                        <SectionCard title="Pressão de Sincronização" subtitle={`Janela de ${syncPressure.window_minutes || 30} minutos para entender o peso do awaiting_sync.`} icon="fas fa-wave-square" className="xl:col-span-3">

                                    <div className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Status Polling</div>

                                </div>
                                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                                    <div className="text-xs font-black uppercase tracking-[0.14em] text-slate-400">Na fila</div>

                                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">

                            <div className="space-y-3 max-h-[520px] overflow-y-auto custom-scroll pr-1">
                                {(liveOverview.active_users || []).length === 0 ? <EmptyState text="Nenhum usuário ativo agora." /> : null}

                                        <div className="flex items-start justify-between gap-3">
                                            <div>
                                                <div className="text-base font-black text-slate-900">{entry.setor || 'Sem setor'}</div>
                                                <div className="text-sm text-slate-600 mt-1">{entry.requester_display_name || entry.requester_username || 'Solicitante não identificado'}</div>

                                            <Pill tone={formatOutcomeTone(entry.outcome)}>{entry.outcome || 'ativo'}</Pill>
