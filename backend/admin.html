<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OneLog - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fas fa-robot text-blue-300 mr-3 text-2xl"></i> OneLog Enterprise
            </h1>
        </div>
    </nav>

    <main class="container mx-auto p-6 mt-4">
        
        <!-- Tela Login Admin -->
        <div id="auth-section" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto mt-10 text-center">
            <h2 class="font-bold text-lg mb-4">Autenticação Administrativa</h2>
            <input type="password" id="admin-token" placeholder="Chave Admin" class="w-full p-2 border rounded mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="loadSectors()" class="bg-blue-600 text-white px-4 py-2 rounded w-full font-bold hover:bg-blue-700">Entrar</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-section" style="display:none;">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-university mr-2 text-gray-400"></i>Contas e Setores Mapeados</h2>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex gap-4 items-end flex-wrap">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-gray-500">Setor AD (ex: BB_Acordos)</label>
                    <input type="text" id="new-setor" class="w-full p-2 border rounded mt-1 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-gray-500">Login Banco do Brasil</label>
                    <input type="text" id="new-login" class="w-full p-2 border rounded mt-1 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-gray-500">Senha Banco do Brasil</label>
                    <input type="password" id="new-senha" class="w-full p-2 border rounded mt-1 text-sm outline-none focus:border-blue-500">
                </div>
                <button onclick="saveAccount()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow transition">Salvar Vínculo</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-4 font-semibold">Setor (AD)</th>
                            <th class="p-4 font-semibold">Status de Mapeamento</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100" id="accounts-table">
                        <!-- Conteúdo dinâmico via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentToken = "";

        async function loadSectors() {
            const tokenInput = document.getElementById('admin-token').value;
            if(!tokenInput) return alert("Digite a chave.");
            
            try {
                const res = await fetch('/api/admin/sectors', { headers: { 'X-Admin-Token': tokenInput } });
                if(!res.ok) throw new Error("Chave inválida");
                
                const data = await res.json();
                currentToken = tokenInput;
                document.getElementById('auth-section').style.display = "none";
                document.getElementById('dashboard-section').style.display = "block";
                
                const tbody = document.getElementById('accounts-table');
                tbody.innerHTML = "";
                data.forEach(s => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-4 font-bold text-gray-700"><i class="far fa-folder text-blue-400 mr-2"></i>${s.nome}</td>
                            <td class="p-4"><span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-bold">Banco de Dados Ativo</span></td>
                        </tr>
                    `;
                });
            } catch(e) {
                alert("Acesso Negado.");
            }
        }

        async function saveAccount() {
            const setor = document.getElementById('new-setor').value;
            const login = document.getElementById('new-login').value;
            const senha = document.getElementById('new-senha').value;

            if(!setor || !login || !senha) return alert("Preencha todos os campos.");

            const res = await fetch('/api/admin/configure_account', {
                method: 'POST',
                headers: { 'X-Admin-Token': currentToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ setor, login, senha })
            });

            if(res.ok) {
                alert("Conta vinculada com sucesso!");
                document.getElementById('new-setor').value = '';
                document.getElementById('new-login').value = '';
                document.getElementById('new-senha').value = '';
                loadSectors(); // Recarrega a tabela
            } else {
                alert("Erro ao salvar conta no Banco de Dados.");
            }
        }
    </script>
</body>
</html>
